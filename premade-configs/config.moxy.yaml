# Moxy — build config for the static instances (derived from Recursive + Lilex)
#
# Important: this config is applied to Recursive's original variable font, before
# Moxy exists. Any OpenType feature tags here must be Recursive source features,
# not Moxy runtime/revert features.

#
#    __  __   ___  __  __  __   __
#   |  \/  | / _ \ \ \/ /  \ \ / /
#   | |\/| || (_) | >  <    \ V /
#   |_|  |_| \___/ /_/\_\    |_|
#
#   Moxy — a monospaced coding font (built on Recursive, borrows from Lilex)
#

# -----------------------------------------------------------------------------
# Family Name

# The font family name. Moxy uses this directly (no "Rec Mono"/"Recursive"
# prefix): "Moxy" -> family "Moxy", folder "fonts/Moxy-Static/", files
# "Moxy-<Style>-<version>.ttf".
# Keep under 13 characters in length to avoid potential OS bugs.

Family Name: "Moxy Static"
# font version is derived from the VF source file (e.g., Recursive_VF_1.085.ttf)
Version: "1"

# -----------------------------------------------------------------------------
# Font Styles

# The variable axis values for the Regular, Italic, Bold, & Bold Italic fonts.
# See https://recursive.design for more information on these.

# MONO: 0 for Sans, 1 for Mono (or anything in-between)
# CASL: 0 for Linear, 1 for Casual (or anything in-between)
# wght: 300–1000 (realistically, about 400 for Regular & Italic and about 700 for Bold & Bold Italic)
# slnt: 0 to -15 (negative numbers are more slanted, and approximately equal to degrees of slope)
# CRSV: 0 (0 for Roman, 1 for Cursive)

Fonts:
  Regular:
    MONO: 1
    CASL: 0.5
    wght: 375
    slnt: 0
    CRSV: 0

  Italic:
    MONO: 1
    CASL: 0
    wght: 375
    slnt: -15
    CRSV: 0

  Bold:
    MONO: 1
    CASL: 0.5
    wght: 600
    slnt: 0
    CRSV: 0

  Bold Italic:
    MONO: 1
    CASL: 0
    wght: 600
    slnt: -15
    CRSV: 0

# -----------------------------------------------------------------------------
# Line Height

# Multiplier for line height (1.0 = default, 1.2 = 20% more space between lines)
# Adjusts the font's internal line gap metric
Line Height Multiplier: 1.05

# -----------------------------------------------------------------------------
# Character Spacing

# Multiplier for character spacing (1.0 = default, 1.05 = 5% wider)
# Adjusts advance width of all glyphs uniformly
Character Spacing: 1.0

# -----------------------------------------------------------------------------
# Font Features from Recursive

# Freeze in code ligatures? True or False
Code Ligatures: True

# Include Recursive font features to freeze into the static output.
#
# Use Recursive's feature tags here, not Moxy's feature tags.
# - Good: ss02, ss03, ss06, ss09, ss10, ss11, titl, etc. from Recursive.
# - Do not use: lilx, ss13, or other Moxy variable-font revert toggles.
#
# The static build starts from Recursive's original VF, then bakes these choices
# into the generated TTF files. The Moxy VF's inverted meanings do not apply here.
#
# Recursive feature reference:
#     https://github.com/arrowtype/recursive-code-config#1-customize-your-font-settings-in-configyaml

# (Keep the hyphen before each list item)
Features:
  # - ss01 # Single story a
  - ss02 # Single story g
  - ss03 # Simplified f
  # - ss04 # Simplified i
  # - ss05 # Simplified l
  - ss06 # Simplified r
  # - ss07 # Simplified italic diagonals
  # - ss08 # No-serif L and Z  (off: serif L & Z is the Moxy default)
  - ss09 # Simplified 6 & 9
  - ss10 # Dotted 0
  - ss11 # Simplified 1
  # - ss12 # Simplified @
  - titl # Titling Q (fancy long-tail Q) baked on as the default
  # - frac # fractions



# -----------------------------------------------------------------------------
# Lilex section starts - Borrowed Glyphs
#
# Graft glyph outlines from other open-source fonts into the build. Use this for
# glyphs that don't exist anywhere inside Recursive (so they can't be frozen on
# like the ssXX stylistic sets above). Outlines are weight-matched and
# slant-matched to each instance automatically.
#
# NOTE: borrowed fonts must be OFL-compatible, and their copyright/license must
# be retained when distributing. Lilex is OFL-1.1 (see font-data/Lilex-OFL.txt).
#
# Each entry: a source variable font + a mapping of {target glyph: source glyph}.
# A source value may be a list of glyphs, which are laid out left-to-right and merged
# into one outline (used to rebuild Recursive's backward-drawing ligature glyphs from
# Lilex's .seq parts).
#
# probe (optional): {target, source, axis} – how to weight-match. axis "horizontal"
# measures stroke at mid-height (vertical strokes like parens); "vertical" measures a
# horizontal bar's thickness (dashes / arrow shafts).
#
# max_stroke_mismatch (optional, default 0.12): if the borrowed glyph can't be
# weight-matched to within this fraction of the native stroke (e.g. Lilex's parens
# can't get heavy enough for Bold/Black), the swap is skipped for that instance and
# Recursive's own glyph is kept. Raise it to force the swap on more weights.
Borrowed Glyphs:
  # Lilex cv13 curvier parentheses
  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.12
    probe: { target: parenleft, source: parenleft.cv13, axis: horizontal }
    glyphs:
      parenleft: parenleft.cv13 # Lilex cv13: curvier parentheses
      parenright: parenright.cv13

  # Lilex cv11 "connected bar": |> and <| join the bar to the arrowhead.
  # These are backward-drawing single glyphs, so keep the source's own position.
  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.18
    align: preserve
    probe: { target: bar, source: bar, axis: horizontal }
    glyphs:
      bar_greater.code: bar_greater.liga.cv11 # |>
      less_bar.code: less_bar.liga.cv11 # <|

# -----------------------------------------------------------------------------
# Join Dashes
#
# Connect runs of hyphens into one continuous line, Lilex-style. "--" is left as
# Recursive draws it (two dashes, like Lilex); "---" and longer are joined. Uses
# the same weight-match + fallback as Borrowed Glyphs (heavy weights that Lilex
# can't match keep Recursive's native dashes).
Join Dashes:
  source: font-data/Lilex[wght].ttf
  max_stroke_mismatch: 0.18

# -----------------------------------------------------------------------------
# Add Characters
#
# Import brand-new single-character glyphs that Recursive lacks entirely, with
# cmap entries, from Lilex. These are Lilex's fancier single-character arrows
# (hooked, looping, circular, double). The plain directional arrows that already
# exist in Recursive (↑↓←→↔↕ and diagonals) are handled as swaps in Borrowed
# Glyphs above. Names are Lilex's uniXXXX glyph names.
Add Characters:
  source: font-data/Lilex[wght].ttf
  glyphs:
    [uni21A9, uni21AA, uni21B0, uni21B1, uni21B2, uni21B3, uni21B6, uni21B7,
     uni21BA, uni21BB, uni21C4, uni21C6]

# -----------------------------------------------------------------------------
# Stylistic Sets
#
# Optional, toggleable OpenType stylistic sets (OFF by default; enable in your
# editor/terminal, e.g. ghostty `font-feature = ss03`). Unlike the always-on
# borrows, these only apply when the feature tag is selected.
#
# Thin backslash (Lilex's glyph): a lighter \ — but, unlike Lilex, only when the
# backslash serves as an escape. Escape chars include C/JS escapes (n t r b f v
# a e x u U N), regex classes/properties (d D w W s S b B p P), octal/backrefs
# (0-9), quotes, backslash itself, and regex metacharacters / delimiters
# ([](){}?*+|^$./-). It is never the 2nd of a consecutive pair (\\b -> thin +
# normal + b) and never a Windows drive path (:\). Off by default; enable with
# ghostty `font-feature = ss03`. Tag "ss03" matches Lilex and is free here because
# Recursive's own ss03 (Simplified f) is baked on via the frozen Features list
# below. NOTE: for the variable-font build (features stay live) this must move to
# a conflict-free tag.
Stylistic Sets:
  - feature: ss03
    name: Thin backslash
    source: font-data/Lilex[wght].ttf
    escape_only: true
    glyphs:
      backslash: backslash.ss03

# That’s it! See README for next steps.
