# Moxy - build config for the variable font (derived from Recursive + Lilex)
#
# This mirrors the static config's shape where it can, but the VF keeps Recursive's
# axes live and turns the Moxy choices into defaults with opt-in reverts.
#
# Important: this config is applied to Recursive's original variable font, before
# Moxy's default/revert inversion. Any OpenType feature tags here must be Recursive
# source features, not Moxy runtime/revert features.

# -----------------------------------------------------------------------------
# Family / output

Family Name: "Moxy"
PostScript Name: "Moxy-VF"
Version: "1"

Source VF: "font-data/Recursive_VF_1.085.ttf"
Lilex VF: "font-data/Lilex[wght].ttf"
Output Path: "fonts/Moxy-VF/Moxy[CASL,wght,slnt,CRSV].ttf"

# -----------------------------------------------------------------------------
# Pure monospace
#
# Moxy is a coding font, so the MONO axis is pinned to Mono (1) and dropped — a
# proportional/Sans mode is useless in a terminal, and baking MONO out removes
# ~half of Recursive's gvar deltas (≈28% smaller VF). Set to false to keep the
# MONO axis live (0=Sans … 1=Mono).
Pure Mono: true

# -----------------------------------------------------------------------------
# Variable default
#
# The VF keeps each remaining axis range, but moves the default point so plain
# `Moxy` is a mono linear regular. Omit an axis to keep Recursive's source
# default. (MONO is pinned per "Pure Mono" above, not a live default here.)

Default Axis Location:
  MONO: 1
  CASL: 0
  wght: 375

# Extra named instances at CASL=0 keep macOS CoreText from snapping the default
# to Recursive's own CASL=0 named instances (so the subfamily names stay Moxy's,
# not Recursive's). (MONO is dropped from these automatically once the axis is
# pinned away.)
Named Instances:
  - { name: Light, CASL: 0, wght: 300, slnt: 0, CRSV: 0.5 }
  - { name: Regular, CASL: 0, wght: 375, slnt: 0, CRSV: 0.5 }
  - { name: Medium, CASL: 0, wght: 500, slnt: 0, CRSV: 0.5 }
  - { name: Bold, CASL: 0, wght: 700, slnt: 0, CRSV: 0.5 }
  - { name: Black, CASL: 0, wght: 900, slnt: 0, CRSV: 0.5 }
  - { name: Light Italic, CASL: 0, wght: 300, slnt: -15, CRSV: 0.5 }
  - { name: Italic, CASL: 0, wght: 375, slnt: -15, CRSV: 0.5 }
  - { name: Medium Italic, CASL: 0, wght: 500, slnt: -15, CRSV: 0.5 }
  - { name: Bold Italic, CASL: 0, wght: 700, slnt: -15, CRSV: 0.5 }
  - { name: Black Italic, CASL: 0, wght: 900, slnt: -15, CRSV: 0.5 }

# -----------------------------------------------------------------------------
# Font features from Recursive
#
# Use Recursive's feature tags here, not Moxy's feature tags.
# - Good: ss02, ss03, ss06, ss09, ss10, ss11, etc. from Recursive.
# - Do not use: lilx, ss13, or other Moxy variable-font revert toggles.
#
# These Recursive source features become default-on in the Moxy VF. After the build
# inverts defaults, ss13 becomes the runtime toggle that reverts them back toward
# Recursive. That means ss13 is an output feature, not an input setting here.
#
# Keep this list to Recursive single-substitution ssNN features. Non-ssNN tags
# (e.g. titl) go under "Extra Features" below — they're inverted the same way but
# are NOT bundled into the ss13 revert.
#
# Recursive feature reference:
#     https://github.com/arrowtype/recursive-code-config#1-customize-your-font-settings-in-configyaml

Code Ligatures: True
Long Arrows: True
Invert Defaults: True

Features:
  # - ss01 # Single story a
  - ss02 # Single story g
  - ss03 # Simplified f
  # - ss04 # Simplified i
  # - ss05 # Simplified l
  - ss06 # Simplified r
  # - ss07 # Simplified italic diagonals
  # - ss08 # No-serif L and Z  (off: serif L & Z is the Moxy default)
  - ss09 # Simplified 6 & 9
  - ss10 # Dotted 0
  - ss11 # Simplified 1
  # - ss12 # Simplified @

# -----------------------------------------------------------------------------
# Extra (non-ssNN) Recursive features to invert
#
# Same treatment as the ssNN above (forward lookup -> default-on calt; feature
# rebuilt as a revert), but these are NOT rolled into the ss13 "Alt. Recursive
# choices" bundle — each stays its own runtime revert toggle.
#
#   titl — Recursive's titling Q (Q -> Q.titl, the fancy long-tail Q) becomes the
#          Moxy default; enabling `titl` reverts to Recursive's plain Q.

Extra Features:
  - titl # Titling Q as default; reverts to plain Q

# -----------------------------------------------------------------------------
# Lilex section starts - Borrowed Glyphs
#
# These match the static config, but in the VF they are built as variable glyphs
# and then inverted so the Moxy look is the default.

Borrowed Glyphs:
  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.12
    probe: { target: parenleft, source: parenleft.cv13, axis: horizontal }
    glyphs:
      parenleft: parenleft.cv13
      parenright: parenright.cv13

  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.18
    align: preserve
    probe: { target: bar, source: bar, axis: horizontal }
    glyphs:
      bar_greater.code: bar_greater.liga.cv11
      less_bar.code: less_bar.liga.cv11

Join Dashes:
  source: font-data/Lilex[wght].ttf
  max_stroke_mismatch: 0.18

Add Characters:
  source: font-data/Lilex[wght].ttf
  glyphs:
    [uni21A9, uni21AA, uni21B0, uni21B1, uni21B2, uni21B3, uni21B6, uni21B7,
     uni21BA, uni21BB, uni21C4, uni21C6]

Stylistic Sets:
  - feature: lilx
    name: Thin escape backslash
    source: font-data/Lilex[wght].ttf
    escape_only: true
    glyphs:
      backslash: backslash.ss03
