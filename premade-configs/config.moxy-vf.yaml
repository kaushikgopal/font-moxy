# Moxy - build config for the variable font (derived from Recursive + Lilex)
#
# The VF stays close to Recursive: Recursive's own feature tags (ssNN, titl,
# dlig, …) mean exactly what they mean in Recursive, and are opt-in the same
# way. Moxy adds two forward opt-in features on top:
#
#   moxy — bundle of Recursive letterform choices preferred for Moxy:
#          single-story g (ss02), simplified f/r/6/9/1 (ss03/06/09/11),
#          dotted 0 (ss10), fancy long-tail Q (titl). One toggle, full set.
#   lilx — the Lilex borrowings: curvy parens, connected dashes/bars, thin
#          escape backslash. (The 12 added arrows are always-on, not part of
#          lilx.)
#
# Full Moxy look:  font-feature = moxy, lilx
# Plain Recursive: (bare font)
#
# This config is applied to Recursive's original variable font. Feature tags
# under "Moxy Bundle" are Recursive source features; moxy/lilx are Moxy output
# features built by the script.

# -----------------------------------------------------------------------------
# Family / output

Family Name: "Moxy"
PostScript Name: "Moxy-VF"
Version: "1"

Source VF: "font-data/Recursive_VF_1.085.ttf"
Lilex VF: "font-data/Lilex[wght].ttf"
Output Path: "fonts/Moxy-VF/Moxy[CASL,wght,slnt,CRSV].ttf"

# -----------------------------------------------------------------------------
# Pure monospace
#
# Moxy is a coding font, so the MONO axis is pinned to Mono (1) and dropped — a
# proportional/Sans mode is useless in a terminal, and baking MONO out removes
# ~half of Recursive's gvar deltas (≈28% smaller VF). Set to false to keep the
# MONO axis live (0=Sans … 1=Mono).
Pure Mono: true

# -----------------------------------------------------------------------------
# Variable default
#
# The VF keeps each remaining axis range, but moves the default point so plain
# `Moxy` is a mono linear regular. Omit an axis to keep Recursive's source
# default. (MONO is pinned per "Pure Mono" above, not a live default here.)

Default Axis Location:
  MONO: 1
  CASL: 0
  wght: 375

# These replace Recursive's inherited fvar instances. Keeping the source instances
# leaves Recursive PostScript names/style records in the Moxy VF, which confuses
# CoreText/Ghostty style matching. Keep these at CASL=0 only: CASL remains a live
# axis for `font-variation = CASL=1`, and adding CASL=1 named instances makes
# macOS prefer "Moxy Casual" for a bare `font-family = Moxy` lookup.
# MONO is dropped from coordinates automatically once the axis is pinned away.
Named Instances:
  # CASL=0 (Linear) — the fvar default lives here
  - { name: Light, CASL: 0, wght: 300, slnt: 0, CRSV: 0.5 }
  - { name: Regular, CASL: 0, wght: 375, slnt: 0, CRSV: 0.5 }
  - { name: Medium, CASL: 0, wght: 500, slnt: 0, CRSV: 0.5 }
  - { name: Bold, CASL: 0, wght: 700, slnt: 0, CRSV: 0.5 }
  - { name: Black, CASL: 0, wght: 900, slnt: 0, CRSV: 0.5 }
  - { name: Light Italic, CASL: 0, wght: 300, slnt: -15, CRSV: 0.5 }
  - { name: Italic, CASL: 0, wght: 375, slnt: -15, CRSV: 0.5 }
  - { name: Medium Italic, CASL: 0, wght: 500, slnt: -15, CRSV: 0.5 }
  - { name: Bold Italic, CASL: 0, wght: 700, slnt: -15, CRSV: 0.5 }
  - { name: Black Italic, CASL: 0, wght: 900, slnt: -15, CRSV: 0.5 }

# -----------------------------------------------------------------------------
# Moxy letterform bundle
#
# Recursive source features bundled into the forward `moxy` toggle. Each also
# stays independently available under its own ssNN / titl tag (they compose).
# Add/remove a row to change what `moxy` turns on.
#
# Recursive feature reference:
#     https://github.com/arrowtype/recursive-code-config#1-customize-your-font-settings-in-configyaml

Code Ligatures: True
Long Arrows: True

Moxy Bundle:
  # - ss01 # Single story a
  - ss02 # Single story g
  - ss03 # Simplified f
  # - ss04 # Simplified i
  # - ss05 # Simplified l
  - ss06 # Simplified r
  # - ss07 # Simplified italic diagonals
  # - ss08 # No-serif L and Z  (NOT in Moxy's set — Moxy keeps serifed L & Z)
  - ss09 # Simplified 6 & 9
  - ss10 # Dotted 0
  - ss11 # Simplified 1
  # - ss12 # Simplified @
  - titl # Titling Q (fancy long-tail Q)

# -----------------------------------------------------------------------------
# Lilex section starts - Borrowed Glyphs
#
# These match the static config, but in the VF they are built as variable glyphs
# behind the opt-in `lilx` feature. The 12 added arrows (under "Add Characters"
# below) are always-on (cmap'd straight), not part of lilx.

Borrowed Glyphs:
  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.12
    probe: { target: parenleft, source: parenleft.cv13, axis: horizontal }
    glyphs:
      parenleft: parenleft.cv13
      parenright: parenright.cv13

  - source: font-data/Lilex[wght].ttf
    max_stroke_mismatch: 0.18
    align: preserve
    probe: { target: bar, source: bar, axis: horizontal }
    glyphs:
      bar_greater.code: bar_greater.liga.cv11
      less_bar.code: less_bar.liga.cv11

Join Dashes:
  source: font-data/Lilex[wght].ttf
  max_stroke_mismatch: 0.18

Add Characters:
  source: font-data/Lilex[wght].ttf
  glyphs:
    [uni21A9, uni21AA, uni21B0, uni21B1, uni21B2, uni21B3, uni21B6, uni21B7,
     uni21BA, uni21BB, uni21C4, uni21C6]

Stylistic Sets:
  - feature: lilx
    name: Thin escape backslash
    source: font-data/Lilex[wght].ttf
    escape_only: true
    glyphs:
      backslash: backslash.ss03
